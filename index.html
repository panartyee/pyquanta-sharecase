<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyQuantA仓库站点</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-database"></i>
                <span>PyQuantA</span>
            </div>
            <div class="nav-links">
                <a href="#files" class="active">百度网盘</a>
                <a href="#about">下载</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容区 -->
    <main class="main-content">
        <div class="container">
            <!-- 头部横幅 -->
            <header class="hero">
                <h1><i class="fas fa-database"></i> PyQuantA仓库</h1>
                <p>量子计算资源集合 · 高质量数据与工具分享平台</p>
                <div class="stats">
                    <div class="stat-item">
                        <i class="fas fa-file"></i>
                        <span id="file-count">0</span>
                        <p>文件数量</p>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-download"></i>
                        <span id="download-count">0</span>
                        <p>下载次数</p>
                    </div>
                </div>
            </header>

            <!-- 搜索和筛选 -->
            <section class="filter-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="搜索文件...">
                </div>
                <div class="category-filter">
                    <button class="category-btn active" data-category="all">全部</button>
                    <button class="category-btn" data-category="document">文档</button>
                    <button class="category-btn" data-category="video">视频</button>
                    <button class="category-btn" data-category="software">软件</button>
                    <button class="category-btn" data-category="other">其他</button>
                </div>
            </section>

            <!-- 文件列表 -->
            <section id="files" class="files-section">
                <div class="files-grid" id="files-container">
                    <!-- 文件卡片会通过JavaScript动态加载 -->
                </div>
            </section>

            <!-- 加载状态 -->
            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>加载中...</p>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <p>暂无文件</p>
            </div>
        </div>
    </main>

    <!-- 文件详情模态框 -->
    <div class="modal" id="file-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header">
                <h2 id="modal-title">文件名称</h2>
                <div class="modal-meta">
                    <span id="modal-category"><i class="fas fa-tag"></i> 分类</span>
                    <span id="modal-size"><i class="fas fa-weight"></i> 大小</span>
                    <span id="modal-date"><i class="fas fa-calendar"></i> 日期</span>
                </div>
            </div>
            <div class="modal-body">
                <div class="screenshot-preview">
                    <img id="modal-screenshot" src="" alt="文件截图">
                </div>
                <div class="modal-description" id="modal-description">
                    文件描述信息
                </div>
            </div>
            <div class="modal-footer">
                <a href="#" class="btn-download" id="modal-download" target="_blank">
                    <i class="fas fa-download"></i> 前往百度网盘下载
                </a>
                <button class="btn-copy" id="btn-copy-link">
                    <i class="fas fa-copy"></i> 复制链接
                </button>
            </div>
        </div>
    </div>

    <!-- 关于页面 -->
    <section id="about" class="about-section" style="display: none;">
        <div class="container">
            <h2>关于本站</h2>
            <p>感谢支持PYQUANT-AI，本站用于分享我回测的各种资源和信息。</p>
            <p>大部分文件存储在百度网盘，点击下载按钮即可跳转到百度网盘页面。</p>
            <p>如有问题，请联系：<a href="微信">service wechat: panarte</a></p>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 仓库资源随时更新 | 仅供学习研究使用</p>
            <p class="disclaimer">本站所有资源仅供学习研究使用，请于下载后24小时内删除，支持正版。</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
